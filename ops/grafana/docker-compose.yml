version: "3.9"

# Compose acessório para subir Prometheus + Grafana ao lado do app
# principal. Use com:
#   docker compose -f docker-compose.yml -f ops/grafana/docker-compose.yml up -d
# A rede "default" precisa bater com o nome do projeto principal —
# `external: true` aponta para a rede do compose raiz.

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - default
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - default
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

networks:
  default:
    external: true
    name: dora-metrics_default

volumes:
  grafana-data:
