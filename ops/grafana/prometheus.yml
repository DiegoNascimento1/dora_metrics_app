global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: dora-api
    static_configs:
      - targets:
          - "api:8080"
    metrics_path: /metrics

  - job_name: dora-worker
    static_configs:
      - targets:
          - "worker:9090"
    metrics_path: /metrics
