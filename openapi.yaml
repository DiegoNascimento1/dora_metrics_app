openapi: 3.1.0
info:
  title: DORA Metrics App API
  version: 0.1.0
  description: |
    API interna da plataforma DORA Metrics.
    Contrato fonte para geração de tipos TypeScript do frontend.
  contact:
    name: Time DORA
servers:
  - url: http://localhost:8080
    description: dev local
  - url: https://dora.example.internal
    description: produção (placeholder)

tags:
  - name: health
  - name: metrics
  - name: projects
  - name: people
  - name: identities
  - name: webhooks

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe (checa DB + Redis)
      responses:
        "200":
          description: pronto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: não pronto

  /api/v1/projects:
    get:
      tags: [projects]
      summary: Lista projetos monitorados
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /api/v1/projects/{projectId}/metrics:
    get:
      tags: [metrics]
      summary: Métricas DORA do projeto
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: window
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoraMetrics"
        "404":
          description: projeto não encontrado

  /api/v1/projects/{projectId}/timeseries:
    get:
      tags: [metrics]
      summary: Série temporal diária do projeto (deploys/dia)
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: window
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeseriesResponse"

  /api/v1/projects/{projectId}/deployments:
    get:
      tags: [metrics]
      summary: Lista de deploys de produção na janela (drill-down)
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: window
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"

  /api/v1/projects/{projectId}/export:
    get:
      tags: [metrics]
      summary: Dump bruto da janela em CSV ou JSON
      description: >
        Exporta deployments, incidents ou merge requests do projeto dentro
        da janela em CSV (default) ou JSON. Responde com header
        Content-Disposition: attachment para forçar download direto pelo
        navegador. Fecha o critério "Exportação CSV/JSON" da Fase 4.
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: kind
          required: true
          schema:
            type: string
            enum: [deployments, incidents, merge_requests]
        - in: query
          name: format
          schema:
            type: string
            enum: [csv, json]
            default: csv
        - in: query
          name: window
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Arquivo baixável (CSV ou JSON) com o dump da janela.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="<kind>-<slug>-<window>-<date>.<ext>"
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: array
                items:
                  type: object
        "400":
          description: Parâmetro `kind` ou `format` inválido.
        "404":
          description: Projeto não encontrado.

  /api/v1/people:
    get:
      tags: [people]
      summary: Lista pessoas e suas identidades vinculadas
      parameters:
        - in: query
          name: tenant
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonWithIdentities"
    post:
      tags: [people]
      summary: Cria uma pessoa canônica e opcionalmente vincula identities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonRequest"
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /api/v1/people/{personId}/metrics:
    get:
      tags: [people, metrics]
      summary: Métricas DORA-style atribuídas a uma pessoa
      description: |
        Use para coaching/mentoria. NÃO use para ranking punitivo —
        DORA é métrica de time. Ver docs/01-dora-metrics.md.
      parameters:
        - in: path
          name: personId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: window
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonMetrics"
        "404":
          description: pessoa não encontrada

  /api/v1/identities/unlinked:
    get:
      tags: [identities]
      summary: Lista identidades sem person_id (aguardando merge)
      parameters:
        - in: query
          name: tenant
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Identity"

  /api/v1/identities/automatch:
    get:
      tags: [identities]
      summary: Sugestões de merge (não persiste; ver POST /identities/{id}/link)
      parameters:
        - in: query
          name: tenant
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MergeSuggestion"

  /api/v1/identities/{identityId}/link:
    post:
      tags: [identities]
      summary: Vincula uma identidade a uma pessoa existente
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [personId]
              properties:
                personId:
                  type: string
                  format: uuid
                linkedBy:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"

  /webhooks/gitlab:
    post:
      tags: [webhooks]
      summary: Receptor de webhook do GitLab
      parameters:
        - in: header
          name: X-Gitlab-Token
          required: true
          schema:
            type: string
        - in: header
          name: X-Gitlab-Event
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: aceito
        "401":
          description: token inválido

  /webhooks/jira:
    post:
      tags: [webhooks]
      summary: Receptor de webhook do Jira
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: aceito

components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        checks:
          type: object
          additionalProperties:
            type: string

    Project:
      type: object
      required: [id, slug, name, pathWithNamespace]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        pathWithNamespace:
          type: string
        teamId:
          type: string
          format: uuid
          nullable: true
        active:
          type: boolean

    DoraMetrics:
      type: object
      required: [projectId, windowDays, computedAt, deploymentFrequency, leadTimeMedianSeconds, changeFailureRate, mttrMeanSeconds, classification, sampleSize]
      properties:
        projectId:
          type: string
          format: uuid
        windowDays:
          type: integer
          enum: [7, 30, 90]
        computedAt:
          type: string
          format: date-time
        deploymentFrequency:
          type: number
          description: deploys por dia
        leadTimeMedianSeconds:
          type: integer
          format: int64
          nullable: true
        changeFailureRate:
          type: number
          description: 0.0 a 1.0
          nullable: true
        mttrMeanSeconds:
          type: integer
          format: int64
          nullable: true
        classification:
          type: string
          enum: [elite, high, medium, low, insufficient_data]
        sampleSize:
          type: integer

    TimeseriesPoint:
      type: object
      required: [day, deployCount]
      properties:
        day:
          type: string
          description: ISO date YYYY-MM-DD
        deployCount:
          type: integer

    TimeseriesResponse:
      type: object
      required: [projectId, windowDays, metric, points]
      properties:
        projectId:
          type: string
          format: uuid
        windowDays:
          type: integer
        metric:
          type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/TimeseriesPoint"

    Deployment:
      type: object
      required: [id, sha, status, environmentName]
      properties:
        id:
          type: string
          format: uuid
        sha:
          type: string
        ref:
          type: string
          nullable: true
        status:
          type: string
        triggeredBy:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        environmentName:
          type: string

    Identity:
      type: object
      required: [id, kind, externalUsername]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [gitlab, jira]
        externalId:
          type: string
          nullable: true
        externalUsername:
          type: string
        externalEmail:
          type: string
          nullable: true
        personId:
          type: string
          format: uuid
          nullable: true
        linkedAt:
          type: string
          format: date-time
          nullable: true
        linkedBy:
          type: string
          nullable: true

    Person:
      type: object
      required: [id, displayName, createdAt]
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        primaryEmail:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PersonWithIdentities:
      allOf:
        - $ref: "#/components/schemas/Person"
        - type: object
          required: [identities]
          properties:
            identities:
              type: array
              items:
                $ref: "#/components/schemas/Identity"

    CreatePersonRequest:
      type: object
      required: [tenant, displayName]
      properties:
        tenant:
          type: string
        displayName:
          type: string
        primaryEmail:
          type: string
        avatarUrl:
          type: string
        identityIds:
          type: array
          items:
            type: string
            format: uuid

    PersonMetrics:
      type: object
      required: [personId, windowDays, deploymentsTriggered, leadTimeSampleSize, incidentsLinked]
      properties:
        personId:
          type: string
          format: uuid
        windowDays:
          type: integer
        deploymentsTriggered:
          type: integer
          format: int64
        leadTimeMedianSeconds:
          type: integer
          format: int64
          nullable: true
        leadTimeSampleSize:
          type: integer
          format: int64
        incidentsLinked:
          type: integer
          format: int64

    MergeSuggestion:
      type: object
      required: [a, b, reason, score]
      properties:
        a:
          $ref: "#/components/schemas/Identity"
        b:
          $ref: "#/components/schemas/Identity"
        reason:
          type: string
          enum: [email_exact, username_exact]
        score:
          type: number
