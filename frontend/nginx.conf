server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy reverso para a API (serviço `api` no docker compose).
  # Em produção, substituir pelo endpoint real.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /healthz {
    proxy_pass http://api:8080/healthz;
  }
  location = /readyz {
    proxy_pass http://api:8080/readyz;
  }

  # SPA fallback — Angular Router controla as rotas no client.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo de assets com hash.
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Sem cache para o HTML (atualiza referência aos assets hashados).
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
