server {
  # Imagem nginxinc/nginx-unprivileged escuta em :8080 (uid 101 não pode
  # bindar portas <1024). docker-compose mapeia 4200 → 8080.
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hardening de cabeçalhos de resposta. CSP é deliberadamente permissiva
  # com inline-style (Angular Material gera estilos inline em runtime);
  # sem 'unsafe-inline' o app quebra. Manter atualizada se acrescentar
  # fonte externa.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # Esconde versão do nginx em error pages e headers.
  server_tokens off;

  # Proxy reverso para a API (serviço `api` no docker compose).
  # Em produção, substituir pelo endpoint real.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /healthz {
    proxy_pass http://api:8080/healthz;
  }
  location = /readyz {
    proxy_pass http://api:8080/readyz;
  }

  # SPA fallback — Angular Router controla as rotas no client.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo de assets com hash.
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Sem cache para o HTML (atualiza referência aos assets hashados).
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
