run:
  timeout: 5m
  go: "1.26"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocyclo
    - gosec
    - misspell
    - revive
    - sqlclosecheck
    - bodyclose
    - errorlint
    - nilerr
    - prealloc

linters-settings:
  gocyclo:
    min-complexity: 15
  govet:
    enable-all: true
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: package-comments
      - name: error-return
      - name: error-strings
      - name: receiver-naming
      - name: unused-parameter
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - gosec
    - path: cmd/
      linters:
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
