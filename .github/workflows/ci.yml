name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26.x"]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: dora_test
          POSTGRES_USER: dora
          POSTGRES_PASSWORD: dora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dora -d dora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: backend/go.sum

      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations
        run: make migrate-up
        env:
          POSTGRES_URL: postgres://dora:dora@localhost:5432/dora_test?sslmode=disable

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Test
        run: make test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: dora_test

      - name: Build
        run: make build

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate API types from openapi.yaml
        run: npm run gen-types

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build
